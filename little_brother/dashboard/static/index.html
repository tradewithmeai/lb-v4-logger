<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Brother - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; }

  header {
    background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 600; color: #58a6ff; }
  header .meta { font-size: 13px; color: #8b949e; display: flex; gap: 20px; align-items: center; }
  header .meta span { display: inline-flex; align-items: center; gap: 4px; }
  .refresh-toggle { cursor: pointer; padding: 4px 12px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #8b949e; font-size: 12px; }
  .refresh-toggle.active { background: #1f6feb33; border-color: #58a6ff; color: #58a6ff; }
  .hours-select { background: #21262d; border: 1px solid #30363d; color: #e1e4e8; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px;
    text-align: center;
  }
  .card .value { font-size: 32px; font-weight: 700; color: #e1e4e8; }
  .card .label { font-size: 13px; color: #8b949e; margin-top: 4px; }
  .card:nth-child(1) .value { color: #58a6ff; }
  .card:nth-child(2) .value { color: #f78166; }
  .card:nth-child(3) .value { color: #3fb950; }
  .card:nth-child(4) .value { color: #d2a8ff; }

  .chart-section {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 20px; margin-bottom: 20px;
  }
  .chart-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #e1e4e8; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-wrap { position: relative; height: 280px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  tr:hover { background: #1c2128; }
  .count-cell { text-align: right; font-variant-numeric: tabular-nums; }
  .path-cell { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .title-cell { max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty-msg { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }

  @media (max-width: 900px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Little Brother</h1>
  <div class="meta">
    <span id="total-events">-</span>
    <span id="duration">-</span>
    <span id="db-size">-</span>
    <select class="hours-select" id="hours-select" onchange="refresh()">
      <option value="1">Last 1 hour</option>
      <option value="4">Last 4 hours</option>
      <option value="12">Last 12 hours</option>
      <option value="24" selected>Last 24 hours</option>
      <option value="168">Last 7 days</option>
    </select>
    <button class="refresh-toggle active" id="auto-refresh" onclick="toggleAutoRefresh()">Auto-refresh</button>
  </div>
</header>

<div class="container">
  <div class="cards">
    <div class="card"><div class="value" id="card-windows">-</div><div class="label">Window Switches</div></div>
    <div class="card"><div class="value" id="card-clicks">-</div><div class="label">Mouse Clicks</div></div>
    <div class="card"><div class="value" id="card-files">-</div><div class="label">File Events</div></div>
    <div class="card"><div class="value" id="card-tabs">-</div><div class="label">Browser Tabs</div></div>
  </div>

  <div class="chart-section">
    <h2>Activity Timeline</h2>
    <div class="chart-wrap"><canvas id="timeline-chart"></canvas></div>
  </div>

  <div class="grid-2">
    <div class="chart-section">
      <h2>Top Applications</h2>
      <div class="chart-wrap"><canvas id="apps-chart"></canvas></div>
    </div>
    <div class="chart-section">
      <h2>Mouse Clicks</h2>
      <div class="chart-wrap"><canvas id="clicks-chart"></canvas></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="chart-section">
      <h2>File Activity</h2>
      <div class="chart-wrap"><canvas id="files-chart"></canvas></div>
    </div>
    <div class="chart-section">
      <h2>Most Clicked Windows</h2>
      <div id="click-windows-table"></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="chart-section">
      <h2>Most Active Directories</h2>
      <div id="dirs-table"></div>
    </div>
    <div class="chart-section">
      <h2>Recent Window Switches</h2>
      <div id="windows-table"></div>
    </div>
  </div>

  <div class="chart-section">
    <h2>Browser Tab Activity</h2>
    <div id="tabs-table"></div>
  </div>
</div>

<script>
const COLORS = {
  blue: '#58a6ff', red: '#f78166', green: '#3fb950', purple: '#d2a8ff',
  yellow: '#d29922', orange: '#f0883e', cyan: '#39d2c0', pink: '#db61a2',
};
const CHART_COLORS = [COLORS.blue, COLORS.red, COLORS.green, COLORS.purple, COLORS.yellow, COLORS.orange, COLORS.cyan, COLORS.pink];

let charts = {};
let autoRefresh = true;
let refreshInterval = null;

function getHours() {
  return document.getElementById('hours-select').value;
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('auto-refresh');
  btn.classList.toggle('active', autoRefresh);
  if (autoRefresh) startAutoRefresh(); else stopAutoRefresh();
}

function startAutoRefresh() {
  stopAutoRefresh();
  refreshInterval = setInterval(refresh, 30000);
}

function stopAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
}

async function fetchJSON(url) {
  const resp = await fetch(url);
  return resp.json();
}

function makeOrUpdate(id, type, data, options = {}) {
  if (charts[id]) {
    charts[id].destroy();
  }
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, { type, data, options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
    ...options,
  }});
}

function makeTable(rows, headers) {
  if (!rows || rows.length === 0) return '<div class="empty-msg">No data</div>';
  let html = '<table><tr>';
  for (const h of headers) html += `<th>${h.label}</th>`;
  html += '</tr>';
  for (const r of rows) {
    html += '<tr>';
    for (const h of headers) {
      const cls = h.class || '';
      const val = h.fmt ? h.fmt(r[h.key]) : (r[h.key] ?? '');
      html += `<td class="${cls}">${val}</td>`;
    }
    html += '</tr>';
  }
  return html + '</table>';
}

function truncate(s, n) { return s && s.length > n ? s.slice(0, n - 3) + '...' : (s || ''); }
function formatNum(n) { return (n || 0).toLocaleString(); }

async function refresh() {
  const h = getHours();

  // Summary
  const summary = await fetchJSON('/api/summary');
  const tables = ['active_window_events', 'mouse_click_events', 'file_events', 'browser_tab_events'];
  const tableData = tables.map(t => summary[t]).filter(Boolean);
  const total = tableData.reduce((s, v) => s + (v.count || 0), 0);
  document.getElementById('total-events').textContent = formatNum(total) + ' events';
  document.getElementById('db-size').textContent = summary.db_size_kb + ' KB';

  // Find overall time range
  const firsts = tableData.map(v => v.first).filter(Boolean).sort();
  const lasts = tableData.map(v => v.last).filter(Boolean).sort().reverse();
  if (firsts.length) {
    const start = new Date(firsts[0] + 'Z');
    const end = new Date(lasts[0] + 'Z');
    const mins = Math.round((end - start) / 60000);
    const durStr = mins < 60 ? mins + 'm' : Math.round(mins / 60) + 'h ' + (mins % 60) + 'm';
    document.getElementById('duration').textContent = durStr + ' monitored';
  }

  document.getElementById('card-windows').textContent = formatNum(summary.active_window_events.count);
  document.getElementById('card-clicks').textContent = formatNum(summary.mouse_click_events.count);
  document.getElementById('card-files').textContent = formatNum(summary.file_events.count);
  document.getElementById('card-tabs').textContent = formatNum(summary.browser_tab_events.count);

  // Timeline
  const timeline = await fetchJSON(`/api/timeline?hours=${h}`);
  const allMinutes = new Set();
  for (const key of Object.keys(timeline)) {
    for (const e of timeline[key]) allMinutes.add(e.minute);
  }
  const sortedMins = [...allMinutes].sort();
  const tlLabels = sortedMins.map(m => String(m).slice(11));  // HH:MM

  function getTimeline(key) {
    const map = {};
    for (const e of (timeline[key] || [])) map[e.minute] = e.count;
    return sortedMins.map(m => map[m] || 0);
  }

  makeOrUpdate('timeline-chart', 'line', {
    labels: tlLabels,
    datasets: [
      { label: 'File Events', data: getTimeline('files'), borderColor: COLORS.green, backgroundColor: COLORS.green + '22', fill: true, tension: 0.3, pointRadius: 0 },
      { label: 'Window Switches', data: getTimeline('windows'), borderColor: COLORS.blue, backgroundColor: COLORS.blue + '22', fill: true, tension: 0.3, pointRadius: 0 },
      { label: 'Mouse Clicks', data: getTimeline('clicks'), borderColor: COLORS.red, backgroundColor: COLORS.red + '22', fill: true, tension: 0.3, pointRadius: 0 },
      { label: 'Browser Tabs', data: getTimeline('tabs'), borderColor: COLORS.purple, backgroundColor: COLORS.purple + '22', fill: true, tension: 0.3, pointRadius: 0 },
    ],
  }, {
    scales: {
      x: { type: 'category', ticks: { color: '#484f58', maxTicksLimit: 20 }, grid: { color: '#21262d' } },
      y: { ticks: { color: '#484f58' }, grid: { color: '#21262d' } },
    },
  });

  // Active windows
  const winData = await fetchJSON(`/api/active-windows?hours=${h}`);
  const topApps = (winData.top_apps || []).slice(0, 10);
  makeOrUpdate('apps-chart', 'bar', {
    labels: topApps.map(a => a.process_name.replace('.exe', '')),
    datasets: [{
      label: 'Switches',
      data: topApps.map(a => a.switches),
      backgroundColor: CHART_COLORS.slice(0, topApps.length),
      borderRadius: 4,
    }],
  }, {
    indexAxis: 'y',
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#484f58' }, grid: { color: '#21262d' } },
      y: { ticks: { color: '#e1e4e8', font: { size: 12 } }, grid: { display: false } },
    },
  });

  document.getElementById('windows-table').innerHTML = makeTable(
    (winData.recent || []).slice(0, 15),
    [
      { key: 'timestamp', label: 'Time', fmt: v => v ? v.slice(11, 19) : '' },
      { key: 'process_name', label: 'Process' },
      { key: 'window_title', label: 'Title', class: 'title-cell', fmt: v => truncate(v, 60) },
    ]
  );

  // Mouse clicks
  const clickData = await fetchJSON(`/api/mouse-clicks?hours=${h}`);
  const buttons = clickData.by_button || [];
  makeOrUpdate('clicks-chart', 'doughnut', {
    labels: buttons.map(b => b.button),
    datasets: [{
      data: buttons.map(b => b.cnt),
      backgroundColor: [COLORS.blue, COLORS.red, COLORS.yellow],
    }],
  }, {
    plugins: { legend: { position: 'bottom' } },
  });

  document.getElementById('click-windows-table').innerHTML = makeTable(
    (clickData.by_window || []).slice(0, 10),
    [
      { key: 'title', label: 'Window', class: 'title-cell', fmt: v => truncate(v, 50) },
      { key: 'count', label: 'Clicks', class: 'count-cell', fmt: formatNum },
    ]
  );

  // File events
  const fileData = await fetchJSON(`/api/file-events?hours=${h}`);
  const ftypes = fileData.by_type || [];
  makeOrUpdate('files-chart', 'doughnut', {
    labels: ftypes.map(f => f.event_type),
    datasets: [{
      data: ftypes.map(f => f.cnt),
      backgroundColor: [COLORS.green, COLORS.blue, COLORS.red, COLORS.yellow],
    }],
  }, {
    plugins: { legend: { position: 'bottom' } },
  });

  document.getElementById('dirs-table').innerHTML = makeTable(
    (fileData.top_dirs || []).slice(0, 10),
    [
      { key: 'path', label: 'Directory', class: 'path-cell', fmt: v => truncate(v, 70) },
      { key: 'count', label: 'Events', class: 'count-cell', fmt: formatNum },
    ]
  );

  // Browser tabs
  const tabData = await fetchJSON(`/api/browser-tabs?hours=${h}`);
  if ((tabData.recent || []).length > 0) {
    document.getElementById('tabs-table').innerHTML = makeTable(
      tabData.recent.slice(0, 15),
      [
        { key: 'timestamp', label: 'Time', fmt: v => v ? v.slice(11, 19) : '' },
        { key: 'event_type', label: 'Event' },
        { key: 'title', label: 'Title', class: 'title-cell', fmt: v => truncate(v, 50) },
        { key: 'url', label: 'URL', class: 'path-cell', fmt: v => truncate(v, 60) },
      ]
    );
  } else {
    document.getElementById('tabs-table').innerHTML = '<div class="empty-msg">No browser tab data. Start Chrome with --remote-debugging-port=9222</div>';
  }
}

// Initial load
refresh();
startAutoRefresh();
</script>
</body>
</html>
